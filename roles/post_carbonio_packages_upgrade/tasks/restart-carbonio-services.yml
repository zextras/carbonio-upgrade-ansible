---
# Startup order (for reference):
# 1) ldap, postgres, service-discover server
# 2) service-discover agent, sidecars, application server
# 3) service-discover agent, sidecars, proxyServers
# 4) service-discover agent, sidecars, mtaServers
# 5) service-discover agent, sidecars, files/docs
# 7) service-discover agent, sidecars, workStreamServers
# 7) service-discover agent, sidecars, videoserver

### Detect Patroni and restart the right service (Ubuntu/Debian)
- name: Check if patroni is installed (Debian) 24.9 -> 25.12.1
  become: true
  shell: apt list --installed 2>/dev/null | grep -w '^patroni'
  register: patroni_check_debian
  failed_when: false
  changed_when: false 
  when: 
    - inventory_hostname in groups["postgresServers"]
    - ansible_facts.os_family == "Debian"
  tags:
    - restart-carbonio-services
    - postgresServers

# If Patroni is absent → restart PostgreSQL
- name: Restart postgres(Ubuntu)
  become: true
  ansible.builtin.service:
    name: "postgresql"
    state: restarted
  register: postgres_ubuntu
  when: 
    - inventory_hostname in groups["postgresServers"] 
    - ansible_facts.os_family == "Debian" 
    - "'patroni' not in patroni_check_debian.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

# If Patroni is present → restart Patroni; will pause later
- name: Restart patroni(Ubuntu)
  become: true
  ansible.builtin.service:
    name: "patroni"
    state: restarted
  register: patroni_ubuntu
  when: 
    - inventory_hostname in groups["postgresServers"] 
    -  ansible_facts.os_family == "Debian"
    - "'patroni' in patroni_check_debian.stdout" 
  tags:
    - restart-carbonio-services
    - postgresServers

### Detect Patroni and restart the right service (RHEL)
- name: Check if patroni is installed [RHEL] 24.9 -> 25.12.1
  become: true
  shell: rpm -qa 2>/dev/null | grep -w '^patroni'
  register: patroni_check_rhel
  failed_when: false 
  changed_when: false
  when: 
    - ansible_facts.os_family == "RedHat" 
    - inventory_hostname in groups["postgresServers"]
  tags:
    - restart-carbonio-services
    - postgresServers

# Patroni absent → restart the PostgreSQL unit
- name: Restart postgres(RHEL)
  become: true
  ansible.builtin.service:
    name: "postgresql-16.service"
    state: restarted
  register: postgres_rhel
  when: 
    - inventory_hostname in groups["postgresServers"] 
    - ansible_facts.os_family == "RedHat"
    - "'patroni' not in patroni_check_rhel.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

# Patroni present → restart Patroni
- name: Restart patroni(RHEL)
  become: true
  ansible.builtin.service:
    name: "patroni.service"
    state: restarted
  register: patroni_rhel
  when: 
    - inventory_hostname in groups["postgresServers"] 
    - ansible_facts.os_family == "RedHat"
    - "'patroni' in patroni_check_rhel.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

# After Patroni restart, give cluster time to stabilize
- name: Wait for 60 seconds after Patroni restart (Ubuntu)
  ansible.builtin.pause:
    seconds: 60
  when: 
    -  ansible_facts.os_family == "Debian"
    - inventory_hostname in groups["postgresServers"] 
    - "'patroni' in patroni_check_debian.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

- name: Wait for 60 seconds after Patroni restart (RHEL)
  ansible.builtin.pause:
    seconds: 60
  when: 
    - ansible_facts.os_family == "RedHat" 
    - inventory_hostname in groups["postgresServers"]
    - "'patroni' in patroni_check_rhel.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

# Debug outputs for visibility of what actually restarted
- name: Debug postgres restart status (Ubuntu)
  debug:
    msg: "{{ postgres_ubuntu }}"
  when: 
    - inventory_hostname in groups["postgresServers"]
    -  ansible_facts.os_family == "Debian"
    - "'patroni' not in patroni_check_debian.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

- name: Debug postgres restart status (RHEL)
  debug:
    msg: "{{ postgres_rhel }}"
  when: 
    - inventory_hostname in groups["postgresServers"]
    - ansible_facts.os_family == "RedHat" 
    - "'patroni' not in patroni_check_rhel.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

- name: Debug patroni restart status (Ubuntu)
  debug:
    msg: "{{ patroni_ubuntu }}"
  when: 
    - inventory_hostname in groups["postgresServers"] 
    -  ansible_facts.os_family == "Debian"
    - "'patroni' in patroni_check_debian.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

- name: Debug patroni restart status (RHEL)
  debug:
    msg: "{{ patroni_rhel }}"
  when: 
    - inventory_hostname in groups["postgresServers"] 
    - ansible_facts.os_family == "RedHat" 
    - "'patroni' in patroni_check_rhel.stdout"
  tags:
    - restart-carbonio-services
    - postgresServers

# Restart service-discover
- name: Restart Service-discover service
  become: true
  ansible.builtin.service:
    name: service-discover
    state: restarted
  tags:
    - restart-carbonio-services

### zmcontrol restart controlled by a flag file (skip LDAP master/replica)
- name: Check restart file value
  command: "cat {{ restart_file }}"
  register: restart_zmcontrol_var
  when: >
    inventory_hostname not in groups["masterDirectoryServers"] and
    inventory_hostname not in groups["replicaDirectoryServers"]
  tags:
      - track-zmcontrol

- name: Debug restart file
  when: >
    inventory_hostname not in groups["masterDirectoryServers"] and
    inventory_hostname not in groups["replicaDirectoryServers"]
  debug:
    msg: "{{ restart_zmcontrol_var.stdout }}"

# Restart via zmcontrol (if flag true) (Ubuntu22/RHEL8)
- name: Restart zmcontrol
  become: true
  become_method: su
  become_user: zextras
  command: '/opt/zextras/bin/zmcontrol restart'
  when: >
    ansible_facts.distribution_major_version != "9" and 
    ansible_facts.distribution_major_version != "24" and
    inventory_hostname not in groups["masterDirectoryServers"] and
    inventory_hostname not in groups["replicaDirectoryServers"] and
    restart_zmcontrol_var.stdout | bool
  tags:
    - restart-carbonio-services

# Restart via systemd target (if flag true) (Ubuntu24/RHEL9)
- name: Restart carbonio services [Sysd]
  become: true
  ansible.builtin.systemd:
    name: carbonio.target
    state: restarted
  when: >
    (ansible_facts.distribution_major_version == "9" or ansible_facts.distribution_major_version == "24") and
    inventory_hostname not in groups["masterDirectoryServers"] and
    inventory_hostname not in groups["replicaDirectoryServers"] and
    restart_zmcontrol_var.stdout | bool
  tags:
    - restart-carbonio-services

# After acting on the flag, reset it to "false" (prevents repeated restarts)
- name: Modify restart file
  when: >
    inventory_hostname not in groups["masterDirectoryServers"] and
    inventory_hostname not in groups["replicaDirectoryServers"]
  copy:
      dest: "{{ restart_file }}"
      content: |
        false
  tags:
    - track-zmcontrol

# AppServer (mailboxd) restart (Ubuntu22/RHEL8)
- name: Restart application service
  become: true
  become_method: su
  become_user: zextras
  command: '/opt/zextras/bin/zmmailboxdctl restart'
  when: inventory_hostname in groups["applicationServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24"
  register: appserver_status
  changed_when: appserver_status.rc == 0
  tags:
    - restart-carbonio-services
    - applicationServers

# AppServer (mailboxd) restart (Ubuntu24/RHEL9)
- name: Restart application services [Sysd]
  become: true
  ansible.builtin.systemd:
    name: carbonio-appserver.target
    state: restarted
  when: inventory_hostname in groups["applicationServers"] and (ansible_facts.distribution_major_version == "9" or ansible_facts.distribution_major_version == "24")
  tags:
    - restart-carbonio-services
    - applicationServers

# Run the common handler only once per host 
- name: Ensure restart flag is initialized
  set_fact:
    carbonio_restarted: "{{ carbonio_restarted | default(false) }}"
  tags:
    - restart-carbonio-services

# List enabled carbonio units
- name: Get all carbonio services
  become: true
  shell:
    cmd: "set -o pipefail && systemctl list-unit-files --state=enabled  | awk '/carbonio/ {print $1}'"
    executable: /bin/bash
  register: carbonio_services_in_memory
  changed_when: false
  tags:
    - restart-carbonio-services

### Trigger a shared handler once per role to restart services from the list (app/mta/proxy/files/docs/tasks/preview) (Ubuntu22/RHEL8)
- name: Notify restart of all carbonio services on applicationServers
  debug:
    msg: "Trigger handler to restart carbonio application services"
  changed_when: true
  when: inventory_hostname in groups["applicationServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-services
    - applicationServers

- name: Notify restart of all carbonio services on mtaServers
  debug:
    msg: "Trigger handler to restart carbonio mta services"
  changed_when: true
  when: inventory_hostname in groups["mtaServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-services
    - mtaServers

- name: Notify restart of all carbonio services on proxyServers
  debug:
    msg: "Trigger handler to restart carbonio proxy services"
  changed_when: true
  when: inventory_hostname in groups["proxyServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-services
    - proxyServers

- name: Notify restart of all carbonio services on filesServers
  debug:
    msg: "Trigger handler to restart carbonio files services"
  changed_when: true
  when: inventory_hostname in groups["filesServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-services
    - filesServers

- name: Notify restart of all carbonio services on docsServers
  debug:
    msg: "Trigger handler to restart carbonio docs services"
  changed_when: true
  when: inventory_hostname in groups["docsServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-services
    - docsServers

- name: Notify restart of all carbonio services on taskServers
  debug:
    msg: "Trigger handler to restart carbonio tasks services"
  changed_when: true
  when: inventory_hostname in groups["taskServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-services
    - taskServers

- name: Notify restart of all carbonio services on previewServers
  debug:
    msg: "Trigger handler to restart carbonio preview services"
  changed_when: true
  when: inventory_hostname in groups["previewServers"] and ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24" and (not carbonio_restarted | bool)
  notify: restart_carbonio_services
  tags:
    - restart-carbonio-service
    - previewServers

# Mark as restarted to prevent duplicate handler triggers on the same host
- name: Mark carbonio services as restarted
  set_fact:
    carbonio_restarted: true
  when: carbonio_restarted | bool == false
  tags:
    - restart-carbonio-services

### Restart WSC: message-dispatcher + all ws* services 
- name: Restart carbonio-message-dispatcher services
  become: true
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  when:
    - groups["workStreamServers"] | length > 0
    - inventory_hostname in groups["workStreamServers"][0]
  loop:
    - carbonio-message-dispatcher.service
  tags:
    - restart-wsc-services
    - workStreamServers

- name: Collect WSC carbonio services
  become: true
  shell:
    cmd: "set -o pipefail && systemctl list-unit-files --state=enabled | awk '/ws/ {print $1}'"
    executable: /bin/bash
  register: wsc_services_in_memory
  changed_when: false
  when: inventory_hostname in groups["workStreamServers"]
  tags:
    - restart-carbonio-service
    - workStreamServers

- name: Restart carbonio WSC
  become: true
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  when: inventory_hostname in groups["workStreamServers"]
  loop: "{{ wsc_services_in_memory.stdout_lines }}"
  tags:
    - restart-wsc-services
    - workStreamServers

### Video servers: restart all video* units ( only enabled units)
- name: Get all videoserver services
  become: true
  shell:
    cmd: "set -o pipefail && systemctl list-unit-files --state=enabled | awk '/video/ {print $1}'"
    executable: /bin/bash
  register: videoserver_services_in_memory
  changed_when: false
  when: inventory_hostname in groups["videoServers"]
  tags:
    - restart-videoserver-services
    - videoServers

- name: Restart carbonio videoservers
  become: true
  ansible.builtin.service:
    name: "{{ item }}"
    state: restarted
  when: inventory_hostname in groups["videoServers"]
  loop: "{{ videoserver_services_in_memory.stdout_lines }}"
  tags:
    - restart-videoserver-services
    - videoServers

# Remove the flag on all hosts (final hygiene)
- name: Remove restart file
  file:
      path: "{{ restart_file }}"
      state: absent
  tags:
    - track-zmcontrol

# Restart "carbonio" service (Ubuntu22/RHEL8)
- name: Restart zmconfigd
  become: true
  ansible.builtin.service:
    name: "carbonio"
    state: restarted  
  when: ansible_facts.distribution_major_version != "9" and ansible_facts.distribution_major_version != "24"
  tags:
    - restart-carbonio-services